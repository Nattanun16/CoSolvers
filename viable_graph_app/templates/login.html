<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: #0b1220;
            color: #f4f4f9;
        }

        .page-wrap {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .page-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('{% static "images/homepage.jpg" %}');
            background-size: cover;
            background-position: center;
            filter: brightness(0.55) saturate(1.1);
            z-index: 0;
        }

        .page-wrap::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(12, 15, 30, 0.55), rgba(12, 15, 30, 0.92));
            z-index: 1;
        }

        .login-panel {
            position: relative;
            z-index: 2;
            width: min(520px, 100%);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 5vw, 4.4rem);
            letter-spacing: 0.08em;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.96rem;
            margin-top: 0.3rem;
        }

        .login-form {
            display: grid;
            gap: 1rem;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.5rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 0.98rem;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.62);
        }

        .input-group:hover input,
        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.62);
            background: rgba(255, 255, 255, 0.12);
        }

        .input-icon {
            position: absolute;
            left: 1.15rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.3rem;
            height: 1.3rem;
            display: grid;
            place-items: center;
            color: rgba(255, 255, 255, 0.78);
            font-size: 1.2rem;
        }

        .password-row {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.95rem;
            cursor: pointer;
            user-select: none;
        }

        .bot-check {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1rem;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            margin: 0.35rem 0 1rem;
        }

        .bot-check label {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            user-select: none;
        }

        .bot-checkbox {
            width: 1.6rem;
            height: 1.6rem;
            border: 2px solid rgba(255, 255, 255, 0.76);
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
        }

        .bot-checkbox:checked {
            background: linear-gradient(135deg, #e774ff, #ff90d9);
            border-color: transparent;
        }

        .bot-label {
            font-size: 0.98rem;
            color: #ffffff;
        }

        .bot-logo {
            width: 96px;
            min-width: 96px;
            height: 36px;
            background: #ffffff;
            border-radius: 12px;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .bot-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .login-button {
            display: block;
            width: 50%;
            margin: 0 auto;
            padding: 1rem 1.15rem;
            border-radius: 999px;
            border: none;
            background: linear-gradient(90deg, #d06cf2, #ff99d7);
            color: #0b0b14;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .login-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .login-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.96rem;
            color: rgba(255, 255, 255, 0.78);
            line-height: 1.7;
        }

        .login-footer a {
            color: #8ec2ff;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .messages {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            padding: 0.9rem 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            color: #f7f7fb;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.error {
            border: 1px solid rgba(255, 110, 113, 0.8);
            background: rgba(255, 110, 113, 0.16);
            color: #ffe8e6;
        }

        .message.success {
            border: 1px solid rgba(137, 225, 139, 0.7);
            background: rgba(137, 225, 139, 0.16);
            color: #ecffe9;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .homepage-link {
            position: absolute;
            left: 1.3rem;
            top: 1.3rem;
            z-index: 3;
            padding: 0.75rem 1.05rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.16);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.2s;
        }

        .homepage-link:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }

        @media (max-width: 520px) {
            .login-panel {
                padding: 2rem 1.5rem;
            }

            .homepage-link {
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>

<body>
    <div class="page-wrap">
        <a class="homepage-link" href="{% url 'home' %}">Back to Homepage</a>

        <section class="login-panel" aria-labelledby="login-title">
            <div class="login-header">
                <h1 id="login-title">Log In</h1>
                <p>Sign in with your student account to continue.</p>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="login-form" method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <label class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" name="student_id" placeholder="Enter your student ID" autocomplete="username">
                </label>

                <label class="input-group password-row">
                    <span class="input-icon">🔒</span>
                    <input id="password-input" type="password" name="password" placeholder="Enter Your Password"
                        autocomplete="current-password" oninput="validatePassword(this.value)">
                    <span class="password-toggle" onclick="togglePassword()" role="button">Show</span>
                </label>
                <div id="password-error" style="
                display: none;
                color: #ff6e71;
                font-size: 0.85rem;
                padding: 0.6rem 1rem;
                background: rgba(255, 110, 113, 0.12);
                border: 1px solid rgba(255, 110, 113, 0.5);
                border-radius: 12px;
                line-height: 1.6;">
                </div>

                <script src="https://www.google.com/recaptcha/api.js" async defer></script>

                <div class="bot-check">
                    <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_SITE_KEY }}" data-theme="dark"></div>
                </div>

                <button type="submit" class="login-button">Log In</button>

                <div class="login-footer">
                    <div class="footer-links">
                        <a href="{% url 'reset_password' %}">Forget Password? Reset Password</a>
                        <a href="{% url 'sign_up' %}">No Account? Sign Up</a>
                    </div>
                </div>
            </form>
        </section>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const toggle = document.querySelector('.password-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = 'Hide';
            } else {
                input.type = 'password';
                toggle.textContent = 'Show';
            }
        }
        function validatePassword(value) {
            const errorBox = document.getElementById('password-error');
            const errors = [];

            if (value.length === 0) {
                errorBox.style.display = 'none';
                return;
            }

            if (value.length < 8)
                errors.push('• ต้องมีอย่างน้อย 8 ตัวอักษร');
            if (!/[a-z]/.test(value))
                errors.push('• ต้องมีตัวอักษรพิมพ์เล็ก (a-z)');
            if (!/[A-Z]/.test(value))
                errors.push('• ต้องมีตัวอักษรพิมพ์ใหญ่ (A-Z)');
            if (!/[0-9]/.test(value))
                errors.push('• ต้องมีตัวเลข (0-9)');
            if (!/[^a-zA-Z0-9]/.test(value))
                errors.push('• ต้องมีอักขระพิเศษ เช่น !@#$%');

            if (errors.length > 0) {
                errorBox.innerHTML = errors.join('<br>');
                errorBox.style.display = 'block';
            } else {
                errorBox.style.display = 'none';
            }
        }
    </script>
</body>

</html>
