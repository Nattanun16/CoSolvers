<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>กราฟ – CoSolvers</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #ffb3d9 0%, #e0c0ff 50%, #c8b0ff 100%);
      color: #1a1a1a;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
    }

    .navbar-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 0.06em;
      text-decoration: none;
      background: linear-gradient(90deg, #fff 30%, #ffb3d9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links { display:flex; gap:2rem; list-style:none; }

    .nav-links a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { text-decoration: underline; text-underline-offset: 4px; }

    /* MAIN */
    .charts-row {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 1.5rem;
      padding: 1rem 2.5rem 3rem;
      align-items: start;
    }

    .chart-card {
      background: #ffffff;
      border: 2px solid #1a1a1a;
      border-radius: 20px;
      padding: 1.5rem;
      position: relative;
    }

    /* PANEL (right side: category % -> problems -> solutions) */
    .panel-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      min-height: 1.6rem;
    }

    .panel-back {
      display: none;
      align-items: center;
      gap: 0.3rem;
      background: none;
      border: none;
      color: #d4007a;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }

    .panel-back.show { display: flex; }
    .panel-back:hover { opacity: 0.7; }

    .panel-title {
      font-family: 'IBM Plex Sans Thai', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .panel-list { list-style:none; display:flex; flex-direction:column; gap:0.6rem; }

    .panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      border: 1.5px solid #ffd0e8;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      background: #fff8fc;
    }

    .panel-row:hover { background: #ffe8f5; transform: translateX(3px); }

    .panel-row .row-label { font-weight: 600; color: #333; font-size: 0.95rem; }

    .row-badge {
      flex-shrink: 0;
      background: #e91e8c;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
    }

    .row-swatch {
      display:inline-block;
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    .panel-empty {
      color: #999;
      font-size: 0.9rem;
      padding: 1rem 0.2rem;
    }

    /* solution sub-list inside panel */
    .sol-item {
      border: 1.5px solid #ffd0e8;
      border-radius: 12px;
      padding: 0.7rem 0.9rem;
      background: #fff8fc;
    }

    .sol-item + .sol-item { margin-top: 0.55rem; }

    .sol-item .sol-text { font-size: 0.88rem; color: #333; font-weight: 500; }

    .sol-item .sol-meta {
      display:flex; gap:0.5rem; margin-top:0.4rem; flex-wrap:wrap;
    }

    .sol-pill {
      background:#fce4f3; color:#c0006a; padding:2px 8px;
      border-radius:12px; font-size:0.75rem; font-weight:600;
    }

    .sol-toggle {
      background:none; border:none; cursor:pointer; font-size:0.8rem;
      color:#e91e8c; margin-right:4px; padding:0;
    }

    .sol-members {
      margin: 0.5rem 0 0 0; padding-left: 1.1rem; display:none;
      font-size: 0.82rem; color:#555;
    }

    @media (max-width: 640px) {
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="navbar-brand" href="{% url 'home' %}">CoSolvers</a>
    <ul class="nav-links">
      <li><a href="{% url 'home' %}">หน้าหลัก</a></li>
      <li><a href="{% url 'propose_solution' %}">เสนอแนวทางแก้ปัญหา</a></li>
      <li><a href="{% url 'graph' %}" class="active">กราฟ</a></li>
      {% if user.is_authenticated %}
        <li><a href="{% url 'profile' %}">โปรไฟล์</a></li>
        <li><a href="{% url 'logout' %}">ออกจากระบบ</a></li>
      {% else %}
        <li><a href="{% url 'login' %}">เข้าสู่ระบบ</a></li>
      {% endif %}
    </ul>
  </nav>

  <!-- CHARTS -->
  <div class="charts-row">

    <!-- LEFT: the one and only chart -->
    <div class="chart-card">
      <canvas id="barChart"></canvas>
    </div>

    <!-- RIGHT: drilldown panel (category % -> problems -> solutions) -->
    <div class="chart-card">
      <div class="panel-header">
        <button class="panel-back" id="panel-back" onclick="panelGoBack()">&#8592; กลับ</button>
        <div class="panel-title" id="panel-title">สัดส่วนปัญหาตามประเภท</div>
      </div>
      <div id="panel-body"></div>
    </div>

  </div>

  <script>
    const COLORS = ['#e91e8c','#c084fc','#60a5fa','#fbbf24','#34d399','#f97316','#a78bfa'];
    let chartData = { labels:[], data:[] };
    let mainBarChart = null;

    // เก็บ state ของ panel เพื่อใช้ตอนกด "กลับ"
    const panelStack = [];

    // ── Load main chart + panel ──
    async function init() {
      try {
        const res = await fetch("{% url 'chart_data' %}");
        chartData = await res.json();
        renderMainBar();
        showCategoryList();
      } catch(e) { console.error(e); }
    }

    function renderMainBar() {
      mainBarChart = new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
          labels: chartData.labels,
          datasets: [{ label:'จำนวนปัญหา', data: chartData.data,
            backgroundColor: chartData.labels.map((_, i) => COLORS[i % COLORS.length]),
            borderRadius: 6, borderSkipped: false }]
        },
        options: {
          onClick: (evt, elements) => {
            if (elements.length > 0) {
              const idx = elements[0].index;
              showProblemList(chartData.labels[idx]);
            }
          },
          plugins: { legend:{ display:false },
            title:{ display:true, text:'จำนวนปัญหาในแต่ละหมวดหมู่ (คลิกแท่งเพื่อดูรายละเอียด)', align:'start', color:'#333', font:{size:13} }
          },
          scales: {
            x: { ticks:{ color:'#333', maxRotation:30 }, grid:{ display:false },
              title:{ display:true, text:'หมวดหมู่', color:'#555' } },
            y: { ticks:{ color:'#333', stepSize:1 }, grid:{ color:'rgba(0,0,0,0.06)' } }
          },
          onHover: (evt, elements) => {
            evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
          }
        }
      });
    }

    function setPanelHeader(title, showBack) {
      document.getElementById('panel-title').textContent = title;
      document.getElementById('panel-back').classList.toggle('show', !!showBack);
    }

    function panelGoBack() {
      panelStack.pop(); // ตัด state ปัจจุบันออก
      const prev = panelStack.pop();
      if (!prev) { showCategoryList(); return; }
      if (prev.type === 'category') showCategoryList();
      else if (prev.type === 'problems') showProblemList(prev.category, false);
    }

    // ── ระดับ 1: รายชื่อประเภทปัญหา + สัดส่วน % ──
    function showCategoryList() {
      panelStack.length = 0;
      panelStack.push({ type:'category' });
      setPanelHeader('สัดส่วนปัญหาตามประเภท', false);

      const body = document.getElementById('panel-body');
      const total = chartData.data.reduce((a,b)=>a+b,0);

      if (!chartData.labels.length) {
        body.innerHTML = '<div class="panel-empty">ยังไม่มีข้อมูลปัญหา</div>';
        return;
      }

      const list = document.createElement('ul');
      list.className = 'panel-list';
      chartData.labels.forEach((label, i) => {
        const pct = total > 0 ? ((chartData.data[i]/total)*100).toFixed(1) : 0;
        const li = document.createElement('li');
        li.className = 'panel-row';
        li.onclick = () => showProblemList(label);
        li.innerHTML = `
          <span class="row-label"><span class="row-swatch" style="background:${COLORS[i % COLORS.length]}"></span>${label}</span>
          <span class="row-badge">${pct}%</span>
        `;
        list.appendChild(li);
      });
      body.innerHTML = '';
      body.appendChild(list);
    }

    // ── ระดับ 2: รายชื่อปัญหาย่อยในประเภทที่เลือก ──
    async function showProblemList(categoryLabel, pushState = true) {
      if (pushState) panelStack.push({ type:'problems', category: categoryLabel });
      setPanelHeader(`ปัญหาในหมวด "${categoryLabel}"`, true);

      const body = document.getElementById('panel-body');
      body.innerHTML = '<div class="panel-empty">กำลังโหลด...</div>';

      try {
        const res = await fetch(`/api/problems-by-category/?category=${encodeURIComponent(categoryLabel)}`);
        const result = await res.json();

        if (!result.problems || result.problems.length === 0) {
          body.innerHTML = '<div class="panel-empty">ยังไม่มีปัญหาในหมวดนี้</div>';
          return;
        }

        const list = document.createElement('ul');
        list.className = 'panel-list';
        result.problems.forEach(p => {
          const li = document.createElement('li');
          li.className = 'panel-row';
          li.onclick = () => showSolutionsFor(p.id, p.title, categoryLabel);
          li.innerHTML = `
            <span class="row-label">${p.title}</span>
            <span class="row-badge">${p.count} วิธีแก้</span>
          `;
          list.appendChild(li);
        });
        body.innerHTML = '';
        body.appendChild(list);
      } catch (e) {
        console.error(e);
        body.innerHTML = '<div class="panel-empty">โหลดข้อมูลไม่สำเร็จ</div>';
      }
    }

    // ── ระดับ 3: กราฟวิธีแก้เทียบจำนวนวิธีแก้ที่คล้ายกัน ──
    async function showSolutionsFor(problemId, problemTitle, categoryLabel) {
      panelStack.push({ type:'solutions', problemId, problemTitle, category: categoryLabel });
      setPanelHeader(`วิธีแก้: ${problemTitle}`, true);

      const body = document.getElementById('panel-body');
      body.innerHTML = '<div class="panel-empty">กำลังโหลด...</div>';

      try {
        const res = await fetch(`/api/problem-solutions/?problem_id=${problemId}`);
        const solData = await res.json();

        body.innerHTML = '';

        const canvasWrap = document.createElement('div');
        canvasWrap.style.marginBottom = '1.2rem';
        const canvas = document.createElement('canvas');
        canvas.id = 'panel-solution-chart';
        canvasWrap.appendChild(canvas);
        body.appendChild(canvasWrap);

        if (solData.labels && solData.labels.length > 0) {
          new Chart(canvas, {
            type: 'bar',
            data: {
              labels: solData.labels,
              datasets: [{ label: 'จำนวนวิธีแก้ที่คล้ายกัน', data: solData.data,
                backgroundColor: '#e91e8c', borderRadius: 6, borderSkipped: false }]
            },
            options: {
              plugins: { legend: { display: false },
                title: { display: true, text: 'จำนวนวิธีแก้ที่คล้ายกัน', align: 'start', color: '#333', font:{size:12} }
              },
              scales: {
                x: { ticks: { color: '#333', maxRotation: 30, font:{size:10} }, grid: { display: false } },
                y: { ticks: { color: '#333', stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.06)' } }
              }
            }
          });
        }

        if (solData.details && solData.details.length > 0) {
          const listWrap = document.createElement('div');
          solData.details.forEach((item) => {
            const hasMembers = item.members && item.members.length > 1;
            const div = document.createElement('div');
            div.className = 'sol-item';
            div.innerHTML = `
              <div class="sol-text">
                ${hasMembers ? `<button class="sol-toggle" onclick="toggleSolMembers(this)">&#9656;</button>` : ''}
                ${item.text}
              </div>
              <div class="sol-meta">
                <span class="sol-pill">${item.count} คนเสนอคล้ายกัน</span>
                ${item.rating > 0 ? `<span class="sol-pill">คะแนน ${item.rating}</span>` : ''}
              </div>
              ${hasMembers ? `<ul class="sol-members">${item.members.map((m,i)=>`<li>${i+1}. ${m}</li>`).join('')}</ul>` : ''}
            `;
            listWrap.appendChild(div);
          });
          body.appendChild(listWrap);
        } else {
          const empty = document.createElement('div');
          empty.className = 'panel-empty';
          empty.textContent = 'ยังไม่มีวิธีแก้สำหรับปัญหานี้';
          body.appendChild(empty);
        }
      } catch (e) {
        console.error(e);
        body.innerHTML = '<div class="panel-empty">โหลดข้อมูลไม่สำเร็จ</div>';
      }
    }

    function toggleSolMembers(btn) {
      const ul = btn.closest('.sol-item').querySelector('.sol-members');
      if (!ul) return;
      const isOpen = ul.style.display === 'block';
      ul.style.display = isOpen ? 'none' : 'block';
      btn.innerHTML = isOpen ? '&#9656;' : '&#9662;';
    }

    init();
  </script>
</body>
</html>
